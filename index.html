<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR全景看房 - Three.js 立方体贴图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    .scene-btns {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; z-index: 10;
    }
    .scene-btn {
      padding: 10px 24px; border: 1px solid rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.5); color: #fff; border-radius: 25px;
      font-size: 14px; cursor: pointer; backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .scene-btn.active { background: #ff5a5f; border-color: #ff5a5f; }

    .gyro-tip {
      position: fixed; top: 20px; right: 20px; z-index: 10;
      color: #fff; font-size: 13px; background: rgba(0,0,0,0.6);
      padding: 6px 14px; border-radius: 20px; display: none;
    }
    .gyro-tip.show { display: block; }

    .auth-btn {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      padding: 14px 30px; background: #ff5a5f; color: #fff; border: none;
      border-radius: 30px; font-size: 16px; cursor: pointer; z-index: 20; display: none;
    }
    .auth-btn.show { display: block; }

    .loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #fff; font-size: 16px; z-index: 30;
    }
    .loading.hide { display: none; }
  </style>
</head>
<body>
  <div class="loading" id="loading">加载中...</div>

  <div class="scene-btns" id="sceneBtns">
    <button class="scene-btn active" data-scene="0">客厅</button>
    <button class="scene-btn" data-scene="1">厨房</button>
    <button class="scene-btn" data-scene="2">阳台</button>
  </div>

  <div class="gyro-tip" id="gyroTip">📱 陀螺仪已激活</div>
  <button class="auth-btn" id="authBtn">点击开启陀螺仪</button>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ==========================================
    // 1. 场景数据配置（你的目录结构）
    // ==========================================
    const panoramaSets = [
      {
        name: '客厅',
        faces: [
          'src/image/livingRoom/living_r.jpg', // 右
          'src/image/livingRoom/living_l.jpg', // 左
          'src/image/livingRoom/living_u.jpg', // 上（天花板）
          'src/image/livingRoom/living_d.jpg', // 下（地板）
          'src/image/livingRoom/living_f.jpg', // 前
          'src/image/livingRoom/living_b.jpg'  // 后
        ]
      },
      {
        name: '厨房',
        faces: [
          'src/image/kitchen/kitchen_r.jpg',
          'src/image/kitchen/kitchen_l.jpg',
          'src/image/kitchen/kitchen_u.jpg',
          'src/image/kitchen/kitchen_d.jpg',
          'src/image/kitchen/kitchen_f.jpg',
          'src/image/kitchen/kitchen_b.jpg'
        ]
      },
      {
        name: '阳台',
        faces: [
          'src/image/balcony/balcony_r.jpg',
          'src/image/balcony/balcony_l.jpg',
          'src/image/balcony/balcony_u.jpg',
          'src/image/balcony/balcony_d.jpg',
          'src/image/balcony/balcony_f.jpg',
          'src/image/balcony/balcony_b.jpg'
        ]
      }
    ];

    // ==========================================
    // 2. 场景、相机、渲染器
    // ==========================================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ==========================================
    // 3. 创建立方体全景
    // ==========================================
function createPanorama(faceUrls) {
  const loader = new THREE.TextureLoader();
  const textures = faceUrls.map(url => loader.load(url));

  const materials = textures.map(tex =>
    new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide })
  );

  const geometry = new THREE.BoxGeometry(1000, 1000, 1000);
  return new THREE.Mesh(geometry, materials);
}

    let currentIndex = 0;
    let panoramaMesh = createPanorama(panoramaSets[0].faces);
    scene.add(panoramaMesh);
    document.getElementById('loading').classList.add('hide');

    // ==========================================
    // 4. 交互控制（鼠标拖拽 + 滚轮缩放FOV）
    // ==========================================
    let isUserInteracting = false;
    let pointerDownX = 0, pointerDownY = 0;
    let lon = 0, lat = 0;
    let targetLon = 0, targetLat = 0;
    let fov = 75;
    let targetFov = 75;

    function onPointerDown(event) {
      isUserInteracting = true;
      const clientX = event.clientX || event.touches[0].clientX;
      const clientY = event.clientY || event.touches[0].clientY;
      pointerDownX = clientX;
      pointerDownY = clientY;
      if (useGyro) suspendGyro();
    }

    function onPointerMove(event) {
      if (!isUserInteracting) return;
      const clientX = event.clientX || event.touches[0].clientX;
      const clientY = event.clientY || event.touches[0].clientY;
      const deltaX = clientX - pointerDownX;
      const deltaY = clientY - pointerDownY;

      targetLon = lon + deltaX * 0.15;
      targetLat = lat - deltaY * 0.15;
      targetLat = Math.max(-85, Math.min(85, targetLat));
    }

    function onPointerUp() {
      isUserInteracting = false;
    }

    function onWheel(event) {
      event.preventDefault();
      const delta = event.deltaY > 0 ? 2 : -2;
      targetFov = fov + delta;
      targetFov = Math.max(30, Math.min(110, targetFov));
    }

    renderer.domElement.addEventListener('touchstart', onPointerDown, { passive: false });
    renderer.domElement.addEventListener('touchmove', onPointerMove, { passive: false });
    renderer.domElement.addEventListener('touchend', onPointerUp);
    renderer.domElement.addEventListener('mousedown', onPointerDown);
    renderer.domElement.addEventListener('mousemove', onPointerMove);
    renderer.domElement.addEventListener('mouseup', onPointerUp);
    renderer.domElement.addEventListener('wheel', onWheel, { passive: false });

    // ==========================================
    // 5. 陀螺仪
    // ==========================================
    let useGyro = false;
    let initialOrientation = null;

    function enableGyro() {
      if (typeof DeviceOrientationEvent !== 'undefined') {
        if (DeviceOrientationEvent.requestPermission) {
          const btn = document.getElementById('authBtn');
          btn.classList.add('show');
          btn.addEventListener('click', async () => {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === 'granted') {
              startGyro();
              btn.classList.remove('show');
            }
          });
        } else {
          startGyro();
        }
      }
    }

    function startGyro() {
      window.addEventListener('deviceorientation', onDeviceOrientation, true);
      useGyro = true;
      document.getElementById('gyroTip').classList.add('show');
    }

    function suspendGyro() {
      useGyro = false;
      document.getElementById('gyroTip').classList.remove('show');
    }

    function onDeviceOrientation(event) {
      if (!useGyro) return;
      const beta = event.beta || 0;
      const gamma = event.gamma || 0;

      if (initialOrientation === null) {
        initialOrientation = { beta, gamma };
      }

      targetLon = (gamma - initialOrientation.gamma) * 1.5;
      targetLat = (beta - initialOrientation.beta) * 1.5;
      targetLat = Math.max(-85, Math.min(85, targetLat));

      lon = targetLon;
      lat = targetLat;
    }

    enableGyro();

    // ==========================================
    // 6. 场景切换
    // ==========================================
    document.querySelectorAll('.scene-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const index = parseInt(btn.dataset.scene);
        if (index === currentIndex) return;

        // 移除旧立方体，创建新立方体
        scene.remove(panoramaMesh);
        panoramaMesh = createPanorama(panoramaSets[index].faces);
        scene.add(panoramaMesh);

        document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentIndex = index;

        // 重置视角
        lon = 0; lat = 0;
        targetLon = 0; targetLat = 0;
      });
    });

    // ==========================================
    // 7. 窗口大小调整
    // ==========================================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==========================================
    // 8. 动画循环（平滑插值）
    // ==========================================
    function animate() {
      requestAnimationFrame(animate);

      lon += (targetLon - lon) * 0.1;
      lat += (targetLat - lat) * 0.1;
      fov += (targetFov - fov) * 0.15;

      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon);
      camera.lookAt(
        Math.sin(phi) * Math.cos(theta),
        Math.cos(phi),
        Math.sin(phi) * Math.sin(theta)
      );

      camera.fov = fov;
      camera.updateProjectionMatrix();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
